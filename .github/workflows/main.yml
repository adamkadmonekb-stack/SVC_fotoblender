name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Скачиваем архив напрямую с Яндекс Диска
    - name: Download project archive from Yandex Disk
      run: |
        curl -L "https://disk.yandex.ru/d/9l2F7S0LqjXxNA" -o project.zip || \
        curl -L "https://disk.yandex.ru/d/9l2F7S0LqjXxNA" | grep -o 'https://[^"]*' | head -n 1 | xargs curl -L -o project.zip
        
        # Распаковываем файлы
        unzip -o project.zip
        rm project.zip

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: bin/*.apk
