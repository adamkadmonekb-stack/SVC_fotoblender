name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Скачиваем архив через чистый curl по прямой ссылке
    - name: Download project archive from Google Drive
      run: |
        FILE_ID="14BMDDdiNjy8LYWqxUUef3schpMJ2GyiL"
        echo "Скачиваем файл с ID: $FILE_ID"
        
        # Скачиваем страницу подтверждения для больших файлов
        curl -sc /tmp/cookie "https://google.com{FILE_ID}" > /tmp/confirm.html
        
        # Вытаскиваем код подтверждения, если он есть
        CONFIRM=$(grep -o 'confirm=[^&]*' /tmp/confirm.html | head -n 1 | cut -d= -f2)
        
        # Качаем сам архив приложения
        if [ -n "$CONFIRM" ]; then
          curl -Lb /tmp/cookie "https://google.com{CONFIRM}&id=${FILE_ID}" -o project.zip
        else
          curl -Lb /tmp/cookie "https://google.com{FILE_ID}" -o project.zip
        fi
        
        # Распаковываем файлы
        unzip -o project.zip
        rm project.zip

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: bin/*.apk
