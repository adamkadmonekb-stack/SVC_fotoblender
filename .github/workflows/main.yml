name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Распаковываем ваш многотомный архив прямо из репозитория
    - name: Extract multi-part RAR archive
      run: |
        sudo apt-get update
        sudo apt-get install -y unrar
        
        # Распаковываем первую часть (остальные подтянутся сами)
        unrar x -o+ "СВЧ.part1.rar"
        
        # Удаляем архивы, чтобы они не занимали место
        rm -f "СВЧ.part"*.rar

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: bin/*.apk
