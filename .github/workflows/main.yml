name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Скачиваем архив через надежный скрипт Python
    - name: Download project archive from Google Drive
      run: |
        python3 -c "
        import urllib.request, re
        url = 'https://google.com'
        file_id = re.search(r'/d/([a-zA-Z0-9_-]+)', url).group(1)
        confirm_url = f'https://google.com{file_id}'
        
        # Запрашиваем страницу подтверждения для больших файлов
        req = urllib.request.Request(confirm_url, headers={'User-Agent': 'Mozilla/5.0'})
        try:
            with urllib.request.urlopen(req) as response:
                html = response.read().decode('utf-8', errors='ignore')
                confirm_match = re.search(r'confirm=([a-zA-Z0-9_-]+)', html)
                
                if confirm_match:
                    confirm_code = confirm_match.group(1)
                    download_url = f'https://google.com{confirm_code}&id={file_id}'
                else:
                    download_url = confirm_url
                    
            print('Скачиваю архив приложения...')
            urllib.request.urlretrieve(download_url, 'project.zip')
            print('Архив успешно скачан!')
        except Exception as e:
            print('Ошибка при скачивании файла:', e)
            exit(1)
        "
        
        # Распаковываем файлы
        unzip -o project.zip
        rm project.zip

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: bin/*.apk
