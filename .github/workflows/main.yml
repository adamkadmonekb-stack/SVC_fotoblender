name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Настраиваем правильную версию Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Настраиваем стабильный Python 3.11
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Автоматически распаковываем ваши 62 картинки и main.py из 4 частей архива RAR
    - name: Extract multi-part RAR archive
      run: |
        sudo apt-get update
        sudo apt-get install -y unrar
        unrar x -o+ "СВЧ.part1.rar"
        rm -f "СВЧ.part"*.rar

       # Устанавливаем инструменты сборки (добавлен libtool-bin и libwebp-dev)
    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool libtool-bin pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma libwebp-dev
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" cython virtualenv

    # Автоматически принимаем все лицензии Android SDK
    - name: Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        buildozer android licenses || true

    # Запускаем сборку через вызов модуля Python (защита от Broken Pipe)
    - name: Build with Buildozer
    env:
        ANDROID_NDK_HOME: ""
        ANDROID_NDK_LATEST_HOME: ""
        ANDROID_NDK: ""
        JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
      run: |
        # Стираем старый застрявший кэш Python 3.14
        buildozer android clean
        
        # Запускаем чистую сборку заново
        python3 -m buildozer --auto-accept android debug

        # Сохраняем готовый APK-файл для скачивания
        - name: Upload APK Artifact
          uses: actions/upload-artifact@v4
          with:
            name: svch-app-apk
            path: bin/*.apk

