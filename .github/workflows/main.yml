name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Download project archive from Google Drive
      run: |
        URL="https://google.com"
        
        FILE_ID=$(echo "$URL" | sed -r 's/.*(-id=|file\/d\/|\/d\/)([a-zA-Z0-9_-]+).*/\2/')
        echo "Скачиваем файл с ID: $FILE_ID"
        curl -sc /tmp/cookie "https://google.com{FILE_ID}" > /tmp/confirm.html
        CONFIRM=$(grep -o 'confirm=[^&]*' /tmp/confirm.html | head -n 1)
        curl -Lb /tmp/cookie "https://google.com{CONFIRM}&id=${FILE_ID}" -o project.zip
        
        unzip -o project.zip
        rm project.zip

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: my-app-apk
        path: bin/*.apk
