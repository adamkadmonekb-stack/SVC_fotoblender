name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Настраиваем правильную версию Java 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Настраиваем Python (оставили один шаг вместо двух)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Распаковываем ваш многотомный архив прямо из репозитория
    - name: Extract multi-part RAR archive
      run: |
        sudo apt-get update
        sudo apt-get install -y unrar
        unrar x -o+ "СВЧ.part1.rar"
        rm -f "СВЧ.part"*.rar

    # Устанавливаем строго стабильные версии инструментов сборки (добавлен libtool-bin)
    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool libtool-bin pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip install --upgrade pip
        pip install buildozer==1.5.0 cython virtualenv
        pip install --upgrade python-for-android

    # Автоматически принимаем все лицензии Android SDK
    - name: Accept Android SDK Licenses
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        buildozer android licenses || true
        if [ -d "$HOME/.buildozer/android/platform/android-sdk/tools/bin" ]; then
          yes | $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true
        fi

    # Запускаем сборку строго на Java 17
    - name: Build with Buildozer
      env:
        ANDROID_NDK_HOME: ""
        ANDROID_NDK_LATEST_HOME: ""
        ANDROID_NDK: ""
        JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
      run: |
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: bin/*.apk
