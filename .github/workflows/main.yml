name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Скачиваем архив с Яндекс Диска с помощью надежного Python-скрипта
    - name: Download project archive from Yandex Disk
      run: |
        python3 -c "
        import urllib.request, json, os
        pk = 'https://yandex.ru'
        api_url = f'https://yandex.net{pk}'
        try:
            req = urllib.request.urlopen(api_url)
            data = json.loads(req.read().decode())
            download_url = data['href']
            print('Скачиваю файл...')
            urllib.request.urlretrieve(download_url, 'project.zip')
            print('Файл успешно скачан!')
        except Exception as e:
            print('Ошибка при скачивании:', e)
            exit(1)
        "
        
        # Распаковываем файлы
        unzip -o project.zip
        rm project.zip

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip install --upgrade pip
        pip install buildozer cython virtualenv

    - name: Build with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: bin/*.apk
